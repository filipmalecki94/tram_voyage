services:
  tramwajarz:
    image: ghcr.io/${GHCR_OWNER}/tram_voyage:latest
    container_name: tramwajarz
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${BIND_IP:-127.0.0.1}:${TRAM_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
